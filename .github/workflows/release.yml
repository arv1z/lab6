name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get install rpm

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build

      - name: Package
        working-directory: build
        run: cpack
